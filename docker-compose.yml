services:
  backend:
    build: ./Server
    ports:
      - "3000:3000"
    volumes:
      - ./Server:/app
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=TPV
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: db-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: TPV
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
